<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Guia Blox_Reis dos Piratas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container login-card">
    <div class="login-header">
      <h1>Entrar</h1>
      <p>Faça login para acessar dicas, eventos e estratégias do Blox Fruits.</p>
    </div>
    <form>
      <label for="username">Usuário</label>
      <input type="text" id="username" name="username" placeholder="Seu nome" required>

      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>

      <button type="submit" class="button">Entrar</button>
    </form>
    <p class="small">Se não tiver login, use este formulário apenas como demonstração.</p>
    <a href="index.html" class="button button-outline">Voltar ao site</a>
  </main>
</body>
</html>
